name: Expense Report Scheduler
on:
  schedule:
    - cron: "0 6 1 * *"   # 1st of every month at 6:00 AM UTC = 11:30 AM IST
  workflow_dispatch:
permissions:
  contents: write
jobs:
  send-expense-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Keep workflow alive
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git pull origin main --rebase
          git commit --allow-empty -m "chore: keep alive $(date)"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run expense report script
        env:
          PASSWORD_API_KEY: ${{ secrets.PASSWORD_API_KEY }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
        run: python expense_sender.py
      - name: Send Success Notification
        if: success()
        run: |
          python - <<EOF
          import smtplib, os
          from email.mime.text import MIMEText
          msg = MIMEText("✅ Expense Report Job SUCCESS")
          msg["Subject"] = "Expense Automation Success"
          msg["From"] = os.environ["EMAIL_SENDER"]
          msg["To"] = os.environ["EMAIL_RECEIVER"]
          s = smtplib.SMTP("smtp.gmail.com", 587)
          s.starttls()
          s.login(os.environ["EMAIL_SENDER"], os.environ["PASSWORD_API_KEY"])
          s.send_message(msg)
          s.quit()
          EOF
        env:
          PASSWORD_API_KEY: ${{ secrets.PASSWORD_API_KEY }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
      - name: Send Failure Notification
        if: failure()
        run: |
          python - <<EOF
          import smtplib, os
          from email.mime.text import MIMEText
          msg = MIMEText("❌ Expense Report Job FAILED")
          msg["Subject"] = "Expense Automation Failure"
          msg["From"] = os.environ["EMAIL_SENDER"]
          msg["To"] = os.environ["EMAIL_RECEIVER"]
          s = smtplib.SMTP("smtp.gmail.com", 587)
          s.starttls()
          s.login(os.environ["EMAIL_SENDER"], os.environ["PASSWORD_API_KEY"])
          s.send_message(msg)
          s.quit()
          EOF
        env:
          PASSWORD_API_KEY: ${{ secrets.PASSWORD_API_KEY }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
```

